<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Paletizado Preciso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #020617; touch-action: none; }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .ui-panel { pointer-events: auto; }
        /* Evitar selección de texto y comportamientos extraños en móvil */
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body>

    <div class="ui-overlay w-full max-w-[260px] sm:max-w-xs p-1">
        <div class="ui-panel bg-white/95 backdrop-blur-md p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-2xl border border-white/50">
            <h1 class="text-base sm:text-xl font-900 text-slate-900 leading-none tracking-tighter mb-1">Cubicaje de Precisión</h1>
            <p class="text-indigo-600 text-[9px] sm:text-[10px] font-bold uppercase tracking-[0.1em] sm:tracking-[0.2em] mb-4 sm:mb-6">Bloque Nivelado • 70 Sacos</p>

            <div class="mb-4 sm:mb-6">
                <label class="block text-[9px] sm:text-[10px] font-black text-slate-400 uppercase mb-1 sm:mb-2 tracking-widest">Cantidad en Palet</label>
                <input 
                    type="number" 
                    id="sacosInput" 
                    value="10"
                    min="0"
                    max="70"
                    inputmode="numeric"
                    class="w-full text-2xl sm:text-4xl font-black px-3 py-2 sm:px-4 sm:py-3 bg-slate-100 border-2 border-slate-200 rounded-xl sm:rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-800"
                >
            </div>

            <div id="resultBox" class="bg-slate-900 rounded-xl sm:rounded-2xl p-3 sm:p-4 text-white border-b-4 border-indigo-500">
                <p id="resultText" class="text-xs sm:text-sm font-bold italic opacity-90"></p>
            </div>

            <p class="mt-4 text-[8px] sm:text-[9px] text-slate-400 font-bold uppercase text-center tracking-tighter">Usa un dedo para rotar • Dos para zoom</p>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script>
        let scene, camera, renderer, mainGroup, sackGroup;
        const SACOS_POR_FILA = 7;
        const TOTAL_MAX = 70;
        
        const W = 1.333; 
        const L = 2.0;   
        const H = 0.42;  
        
        const TOTAL_WIDTH = L + (2 * W); 
        const TOTAL_DEPTH = 3 * W;

        let isInteracting = false;
        let targetRotationX = 0.5, targetRotationY = 0.8;
        let lastTouchX = 0, lastTouchY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(12, 10, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimización para pantallas retina
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(5, 15, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.set(1024, 1024);
            scene.add(mainLight);

            const blueLight = new THREE.PointLight(0x6366f1, 0.5);
            blueLight.position.set(-10, 5, -5);
            scene.add(blueLight);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            createCustomPallet();

            sackGroup = new THREE.Group();
            mainGroup.add(sackGroup);

            // EVENTOS DE RATÓN
            document.addEventListener('mousedown', () => isInteracting = true);
            document.addEventListener('mouseup', () => isInteracting = false);
            document.addEventListener('mousemove', (e) => {
                if(isInteracting) {
                    targetRotationY += e.movementX * 0.007;
                    targetRotationX += e.movementY * 0.007;
                }
            });

            // EVENTOS TÁCTILES (ANDROID / IOS)
            document.addEventListener('touchstart', (e) => {
                isInteracting = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            }, { passive: false });

            document.addEventListener('touchend', () => {
                isInteracting = false;
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if(isInteracting) {
                    const touchX = e.touches[0].clientX;
                    const touchY = e.touches[0].clientY;
                    
                    const deltaX = touchX - lastTouchX;
                    const deltaY = touchY - lastTouchY;
                    
                    targetRotationY += deltaX * 0.007;
                    targetRotationX += deltaY * 0.007;
                    
                    lastTouchX = touchX;
                    lastTouchY = touchY;
                }
            }, { passive: false });

            window.addEventListener('resize', onWindowResize);
            updateSacks(10);
        }

        function createCustomPallet() {
            const woodMat = new THREE.MeshPhongMaterial({ color: 0x4a3728 });
            const palletBase = new THREE.Group();
            
            const slatWidth = TOTAL_WIDTH + 0.2;
            const slatDepth = 0.5;
            for(let i = 0; i < 6; i++) {
                const slat = new THREE.Mesh(new THREE.BoxGeometry(slatWidth, 0.12, slatDepth), woodMat);
                slat.position.set(0, 0, (i * (TOTAL_DEPTH/5)) - (TOTAL_DEPTH/2));
                slat.castShadow = true;
                slat.receiveShadow = true;
                palletBase.add(slat);
            }

            const beamGeom = new THREE.BoxGeometry(slatWidth, 0.2, 0.15);
            for(let i = -1; i <= 1; i++) {
                const beam = new THREE.Mesh(beamGeom, woodMat);
                beam.position.set(0, -0.16, i * (TOTAL_DEPTH/2 - 0.1));
                palletBase.add(beam);
            }

            palletBase.position.y = 0.4;
            mainGroup.add(palletBase);
        }

        function createBag(isFull) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ 
                color: isFull ? 0xffffff : 0x1e293b,
                opacity: isFull ? 1.0 : 0.05,
                transparent: !isFull,
                shininess: 20
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            if(isFull) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                mesh.add(line);
            }
            return mesh;
        }

        function updateSacks(count) {
            sackGroup.clear();
            for (let i = 0; i < TOTAL_MAX; i++) {
                const layerIndex = Math.floor(i / SACOS_POR_FILA);
                const posInLayer = i % SACOS_POR_FILA;
                const isFull = i < count;
                const isEvenLayer = layerIndex % 2 === 0;
                const bag = createBag(isFull);
                
                if (posInLayer < 4) {
                    const row = Math.floor(posInLayer / 2);
                    const col = posInLayer % 2;
                    bag.scale.set(W, H, L);
                    let x = (TOTAL_WIDTH / 2) - L - (W / 2) - (col * W);
                    let z = (row === 0 ? -L/2 : L/2);
                    if (!isEvenLayer) { x = -x; }
                    bag.position.set(x, (layerIndex * (H + 0.01)) + 0.75, z);
                } 
                else {
                    const hIndex = posInLayer - 4;
                    bag.scale.set(L, H, W);
                    let x = (TOTAL_WIDTH / 2) - (L / 2);
                    let z = (hIndex - 1) * W;
                    if (!isEvenLayer) { x = -x; }
                    bag.position.set(x, (layerIndex * (H + 0.01)) + 0.75, z);
                }
                sackGroup.add(bag);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            mainGroup.rotation.y += (targetRotationY - mainGroup.rotation.y) * 0.1;
            mainGroup.rotation.x += (targetRotationX - mainGroup.rotation.x) * 0.1;
            mainGroup.rotation.x = Math.max(0, Math.min(Math.PI / 2.2, mainGroup.rotation.x));
            renderer.render(scene, camera);
        }

        const input = document.getElementById('sacosInput');
        const resultText = document.getElementById('resultText');

        function updateUI(val) {
            const filas = Math.floor(val / SACOS_POR_FILA);
            const resto = val % SACOS_POR_FILA;
            let msg = "";
            if (filas > 0 && resto > 0) msg = `${filas} ${filas === 1 ? 'fila' : 'filas'} y ${resto} sueltos.`;
            else if (filas > 0) msg = `${filas} ${filas === 1 ? 'fila' : 'filas'} completa(s).`;
            else msg = `${resto} ${resto === 1 ? 'saco' : 'sacos'}.`;
            resultText.innerText = msg;
        }

        input.addEventListener('input', (e) => {
            let val = parseInt(e.target.value) || 0;
            val = Math.max(0, Math.min(TOTAL_MAX, val));
            input.value = val;
            updateUI(val);
            updateSacks(val);
        });

        window.onload = () => {
            init();
            animate();
            updateUI(10);
        };
    </script>
</body>
</html>
